name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/duedilis
      NEXTAUTH_SECRET: ci-placeholder-secret-32-chars-long
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/duedilis
      NEXTAUTH_SECRET: ci-placeholder-secret-32-chars-long
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
      - run: pnpm prisma generate
      - run: pnpm build

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [lint, test]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: duedilis_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/duedilis_test
      DIRECT_DATABASE_URL: postgresql://test:test@localhost:5432/duedilis_test
      NEXTAUTH_SECRET: e2e-test-secret-32-chars-minimum!!
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      E2E_DB_AVAILABLE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm prisma migrate deploy
      - run: node seed_demo.js
      - run: npx playwright install --with-deps chromium
      - run: pnpm build
      - name: Start server and run E2E
        run: |
          pnpm start &
          npx wait-on http://localhost:3000 --timeout 30000
          pnpm exec playwright test --project=chromium --project=mobile-chrome

  performance:
    name: Performance Smoke
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      - name: Run smoke test
        run: k6 run tests/load/smoke.js --env BASE_URL=${{ secrets.PREVIEW_URL }}
        env:
          TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}

  e2e-cross-browser:
    name: E2E Cross-Browser
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/testdb
      DIRECT_DATABASE_URL: postgresql://test:test@localhost:5432/testdb
      NEXTAUTH_SECRET: e2e-test-secret-32-chars-minimum!!
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      E2E_DB_AVAILABLE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm prisma migrate deploy
      - run: node seed_demo.js
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: pnpm build
      - name: Start server and run E2E (${{ matrix.browser }})
        run: |
          pnpm start &
          npx wait-on http://localhost:3000 --timeout 30000
          BROWSER=${{ matrix.browser }} pnpm exec playwright test --project=${{ matrix.browser }}
